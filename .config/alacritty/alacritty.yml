env:
  TERM: xterm-256color

window:
  dimensions:
    columns: 120
    lines: 42
  padding:
    x: 5
    y: 2

font:
  normal:
    family: JetBrains Mono NL
    style: Regular
  size: 11
  offset:
    x: 1
    y: 2
  use_thin_strokes: false

draw_bold_text_with_bright_colors: true

background_opacity: 0.9
