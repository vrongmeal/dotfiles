# -----------------
# My configurations
# -----------------

# Remap prefix from 'C-b' to 'C-a'
unbind     C-b
set-option -g prefix C-a
bind-key   C-a send-prefix

# Split panes using | and _
# (Underscore because typing | and _ both require pressing Shift)
unbind '"'
unbind %
bind   | split-window -h
bind   _ split-window -v

# Reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Don't rename windows automatically
set-option -g allow-rename off

# --------------
# Visual Changes
# --------------

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# modes
setw -g clock-mode-colour colour214
setw -g mode-style        'fg=colour214 bold'

# panes
set -g pane-border-style        'fg=colour235'
set -g pane-active-border-style 'fg=colour214'

# statusbar
set -g status-position     bottom
set -g status-justify      left
set -g status-style        'bg=colour235 fg=colour255'
set -g status-left         ''
set -g status-right        ' #{?client_prefix,#[fg=colour210]• ,}#h #[fg=colour0,bg=colour214] %d/%m #[fg=colour0,bg=colour193] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length  20

# Current window style
setw -g window-status-current-style  'fg=colour210 bg=colour233'
setw -g window-status-current-format ' #I##[fg=colour214,bold] #W#[fg=colour249]#{?window_zoomed_flag, ⨁,} '

# Other windows style
setw -g window-status-style  'fg=colour210 bg=colour233 dim'
setw -g window-status-format ' #I##[fg=colour214] #W#[fg=colour249]#{?window_zoomed_flag, ⨁,} '

# Bell style
setw -g window-status-bell-style 'fg=colour255 bg=colour1 bold'

# Messages
set -g message-style 'fg=colour0 bg=colour193'
